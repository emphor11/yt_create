<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}YouTube AI System{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/app.css') }}">
  </head>
  <body class="app-shell">
    <nav class="navbar navbar-expand-lg navbar-light app-nav border-bottom">
      <div class="container">
        <a class="navbar-brand fw-bold" href="{{ url_for('projects.project_list') }}">YTCreate</a>
        <div class="navbar-nav">
          <a class="nav-link" href="{{ url_for('projects.start_here') }}">Start Here</a>
          <a class="nav-link" href="{{ url_for('projects.project_list') }}">Projects</a>
          <a class="nav-link" href="{{ url_for('projects.create_project') }}">New Project</a>
          <a class="nav-link" href="{{ url_for('projects.discarded_projects') }}">Discarded</a>
          <a class="nav-link" href="{{ url_for('analytics.analytics_table') }}">Analytics</a>
        </div>
      </div>
    </nav>

    <main class="container py-4">
      {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
          <div class="mb-4">
            {% for category, message in messages %}
              <div class="alert alert-{{ category if category != 'message' else 'secondary' }} shadow-sm">{{ message }}</div>
            {% endfor %}
          </div>
        {% endif %}
      {% endwith %}

      {% block content %}{% endblock %}
    </main>
  </body>
</html>
